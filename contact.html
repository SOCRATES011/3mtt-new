    <h1>Apply for citizenship</h1>
    <p>Hello World</p>
    <form action="" method="post">
      <label for="Full">Fullname</label>
      <input
        type="text"
        id="Full"
        placeholder="Fullname"
        required
      /><br /><br />
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Email" /><br /><br />
      <label for="tel">Phone number</label>
      <input
        type="tel"
        id="tel"
        placeholder="Phone number"
        value="+234"
        disabled
      /><br /><br />
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password" /><br /><br />
      <label for="DOB">DOB</label>
      <input type="date" id="DOB" placeholder="date_of_birth" /><br /><br />
      <label for="time">Application Time</label>
      <input type="time" id="time" placeholder="Application Time" /><br /><br />
      <label for="Gender">Gender</label><br />
      <input type="radio" id="female" name="sex" /><label for="female"
        >female</label
      ><br />
      <input type="radio" id="male" name="sex" checked /><label for="male"
        >male</label
      ><br /><br />
      <label for="">why are you applying</label><br />
      <input type="checkbox" name="" id="work" /><label for="work">work</label
      ><br />
      <input type="checkbox" name="" id="school" checked /><label for="school"
        >school</label
      ><br />
      <input type="checkbox" name="" id="tour" /><label for="tour"
        >Tourism</label
      ><br /><br />

      <label for="">Race</label><br />
      <select name="" id="">
        <option value="">******select******</option>
        <option value="">Caucasoid</option>
        <option value="">Mongoloid</option>
        <option value="" selected>Negroid</option></select
      ><br /><br />
      <label for="">why should you be considered?</label><br /><br />
      <textarea name="" id="" cols="30" rows="10"></textarea><br />

      <button type="submit">Click here</button>
    </form>
    <button type="button">Click here 2</button>
